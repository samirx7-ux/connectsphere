version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: connectsphere-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: connectsphere-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
